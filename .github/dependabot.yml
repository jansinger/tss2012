version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
    groups:
      production:
        dependency-type: 'production'
      svelte-ecosystem:
        patterns:
          - 'svelte'
          - '@sveltejs/*'
          - 'svelte-check'
          - 'vite'
          - 'typescript'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'
          - 'jsdom'
      linting:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - '@typescript-eslint/*'
          - 'prettier'
          - 'prettier-*'
